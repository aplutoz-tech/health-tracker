name: 📈 抓取台股股價

on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 1,2,3,4,5 * * 1-5'
    - cron: '40 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  fetch-and-alert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r stock-tracker/scripts/requirements.txt

      - name: 抓取股價
        run: python stock-tracker/scripts/fetch_prices.py
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}

      - name: Commit prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock-tracker/data/prices.json
          git diff --cached --quiet || git commit -m "data: update stock prices $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: 檢查警示並建立 Issue
        run: python stock-tracker/scripts/check_alerts.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
